<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking Success</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: rgb(229, 248, 194);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .success-box {
      background-color: white;
      border-radius: 10px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      max-width: 500px;
    }

    h1 {
      color: green;
      font-size: 40px;
      margin-bottom: 20px;
    }

    p {
      font-size: 20px;
      color: #333;
      margin-bottom: 30px;
    }

    a {
      display: inline-block;
      padding: 12px 20px;
      background-color: darkblue;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      font-size: 18px;
      transition: background 0.3s;
    }

    a:hover {
      background-color: #0059b3;
    }
  </style>
</head>
<body>
  <div class="success-box">
    <h1>🎉 Booked Successfully!</h1>
    <p>Thank you for booking with <strong>MyBookStore</strong>.  
       We will contact you soon with more details about your order.</p>
    <a href="index.html">Go Back to Home</a>
  </div>
</body>
</html>
