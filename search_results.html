    }

    #results {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 20px;
    }

    .book-card {
      background: #fff;
      border-radius: 8px;
      padding: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      width: 360px;
      text-align: center;
      font-size: 14px;
      transition: transform 0.2s; 
    }

    .book-card:hover {
      transform: scale(1.03);
    }

    .book-card img {
      width: 100%;
      height: 500px;
      object-fit: cover;
      border-radius: 5px;
    }

    .book-card h3 {
      margin: 6px 0;
      font-size: 16px;
      color: #333;
    }
    .price{
            font-size: 18px;
            font-weight: bold;
            color: green;
        }

    .book-card p {
      font-size: 12px;
      color: #555;
      margin-bottom: 8px;
    }

    .book-card button {
      padding: 6px 10px;
      border: none;
      border-radius: 5px;
      background: #3740e2;
      color: white;
      font-weight: bold;
      cursor: pointer;
      font-size: 13px;
    }

    .book-card button:hover {
      background:blue;
    }
