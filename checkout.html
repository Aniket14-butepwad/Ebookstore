<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout Page</title>
  <style>
    body {
      font-family: Arial, sans-serif; 
      padding: 20px; 
      background: #f9f9f9;
    }
    .container {
      max-width: 500px; 
      margin: auto; 
      background: white; 
      padding: 20px;
      border-radius: 12px; 
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    h2 {
      text-align: center; 
      margin-bottom: 20px;
    }
    label {
      display: block; 
      margin: 10px 0 5px; 
      font-weight: bold;
    }
    input, textarea { 
      width: 100%;
      padding: 10px; 
      margin-bottom: 15px;
      border: 1px solid #ccc; 
      border-radius: 6px;
    }
    .payment-option {
      display: flex; 
      align-items: center; 
      gap: 10px;
      border: 1px solid #ccc;
      padding: 10px; 
      border-radius: 8px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .payment-option img {
      width: 300px; 
      height: 100px;
    }
    .payment-option input[type="radio"] {
       width: 20px;
       height: 20px;
       flex-shrink: 0;
       accent-color: blue; /* modern browsers */
    }
      
    .payment-option.selected {
      background: #d6ebff; /* light blue when selected */
      border-color: #3399ff;
    }
    button {
      background: #28a745; 
      color: white; 
      border: none; 
      padding: 12px;
      width: 100%; 
      border-radius: 8px; 
      font-size: 16px; 
      cursor: pointer;
    }
    button:hover {
      background: #218838;
    }
    button{
       display: inline-block;
      padding: 8px 10px;
      background-color: darkblue;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      font-size: 18px;
      transition: background 0.3s;
      margin-left: 5px;
    }
    .required-star{
      color: red;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Checkout  </h2>
    <form>
      <label for="name">Full Name</label><span class="required-star">*</span></label><br>
      <input type="text" id="name" placeholder="Enter your name" required>

      <label for="email">Email</label><span class="required-star">*</span></label>
      <input type="email" id="email" placeholder="Enter your email" required>

      <label for="number">Phone Number</label><span class="required-star">*</span></label>
      <input type="tel" id="number" placeholder="Enter phone number" required>

      <label for="address">Address</label><span class="required-star">*</span></label>
      <textarea rows="3" id="address" placeholder="Enter your address" required></textarea>
      <button type="button" onclick="saveaddress()">Continue</button>
    </form>
  </div>
  <script>
    function saveaddress(){
      window.location.href="payment.html"
    }
  </script>
</body>
</html>
